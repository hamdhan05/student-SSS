name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # Runs every time you push to main

  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write  # Needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Remove API routes — static export doesn't support them
      - name: Remove API routes for static export
        run: rm -rf pages/api

      # 5. Build the static site
      #    GITHUB_PAGES=true activates the export config in next.config.js
      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      # 6. Deploy the 'out/' folder to the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
